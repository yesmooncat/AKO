<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>
<style>
  body { background-color: #121212; color: #fff; font-family: Arial,sans-serif; margin:0; padding:0; }
  h2 { text-align:center; padding:10px; }
  table { width:100%; border-collapse:collapse; font-size:14px; table-layout: fixed; }
  th, td { border:1px solid #333; padding:6px; text-align:left; word-wrap: break-word; }
  th { background-color:#1e1e1e; position:sticky; top:0; z-index:2; }
  tr.not-relevant { color:#777; }
  a { color:#3399ff; text-decoration:underline; }
  select, input, textarea { background-color:#222; color:#fff; border:1px solid #555; padding:4px; font-size:14px; width:100%; box-sizing:border-box; }
  .btn { background-color:#3399ff; color:#fff; border:none; padding:5px 8px; cursor:pointer; font-size:14px; margin:2px; }
  .btn:hover { background-color:#1e88e5; }
  .modal { display:none; position:fixed; z-index:10; left:0; top:0; width:100%; height:100%; overflow:auto; background-color:rgba(0,0,0,0.9); }
  .modal-content { background-color:#1e1e1e; margin:10% auto; padding:20px; border:1px solid #888; width:90%; color:#fff; max-height:80%; overflow-y:auto; }
  .tab { display:none; }
  .tab-buttons { display:flex; overflow-x:auto; background:#1e1e1e; }
  .tab-buttons button { flex:1; padding:10px; cursor:pointer; background:#1e1e1e; color:#fff; border:none; border-bottom:2px solid transparent; }
  .tab-buttons button.active { border-bottom:2px solid #3399ff; }
  @media (max-width:600px) { th, td { font-size:12px; } }
</style>
</head>
<body>

<h2>Project Tracker</h2>

<div class="tab-buttons" id="tabButtons"></div>

<div id="Projects" class="tab">
  <table id="projectsTable"><thead></thead><tbody></tbody></table>
</div>
<div id="Tasks" class="tab">
  <div style="display:flex; flex-wrap:wrap; gap:5px; padding:5px;">
    <select id="filterProject"></select>
    <select id="filterStatus"></select>
    <select id="filterOwner"></select>
    <select id="filterReviewer"></select>
    <select id="filterPriority"></select>
    <button class="btn" onclick="addTask()">Add Task</button>
    <button class="btn" onclick="saveChanges()">Save</button>
  </div>
  <table id="tasksTable"><thead></thead><tbody></tbody></table>
</div>
<div id="People" class="tab"><table id="peopleTable"><thead></thead><tbody></tbody></table></div>
<div id="Files" class="tab"><table id="filesTable"><thead></thead><tbody></tbody></table></div>
<div id="Updates" class="tab"><table id="updatesTable"><thead></thead><tbody></tbody></table></div>
<div id="Instructions" class="tab"><table id="instructionsTable"><thead></thead><tbody></tbody></table></div>

<div id="updateModal" class="modal">
  <div class="modal-content">
    <h3>Updates for Task: <span id="modalTaskID"></span></h3>
    <div id="updatesList" style="max-height:300px; overflow-y:auto; margin-bottom:10px;"></div>
    <label>Author: 
      <select id="updateAuthor"></select>
      or <input type="text" id="manualAuthor" placeholder="Your name">
    </label><br><br>
    <textarea id="updateMessage" placeholder="Enter comment..." rows="3" style="width:100%;"></textarea><br><br>
    <button class="btn" onclick="addUpdate()">Add Comment</button>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const SHEET_ID = "1GyvpnccBQF0AXroVtncqMMcyTQL70quOBq9MktIUf2s";
const TABS = ["Projects","Tasks","People","Files","Updates","Instructions"];

let projects=[], tasks=[], people=[], files=[], updates=[], instructions=[];

let currentTaskID = null;

async function fetchSheet(name){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${name}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/.*google\.visualization\.Query\.setResponse\((.*)\);/s)[1]);
  return json.table.rows.map(r=>r.c.map(c=>c?c.v:""));
}

async function loadData(){
  projects = await fetchSheet("Projects");
  tasks = await fetchSheet("Tasks");
  people = await fetchSheet("People");
  files = await fetchSheet("Files");
  updates = await fetchSheet("Updates");
  instructions = await fetchSheet("Instructions");
  renderTabs();
  renderAllTables();
  populateFilters();
  populateAuthors();
}

function renderTabs(){
  const btns = document.getElementById("tabButtons");
  btns.innerHTML = "";
  TABS.forEach((tab,i)=>{
    const b = document.createElement("button");
    b.textContent = tab;
    b.onclick = ()=>showTab(tab);
    if(i===0) b.classList.add("active");
    btns.appendChild(b);
  });
  showTab(TABS[0]);
}

function showTab(tabName){
  document.querySelectorAll(".tab").forEach(t=>t.style.display="none");
  document.getElementById(tabName).style.display="block";
  document.querySelectorAll(".tab-buttons button").forEach(b=>b.classList.remove("active"));
  Array.from(document.querySelectorAll(".tab-buttons button")).find(b=>b.textContent===tabName).classList.add("active");
}

function renderTable(tableID,data){
  const table = document.getElementById(tableID);
  table.innerHTML = "";
  if(data.length===0) return;
  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  data[0].forEach((_,i)=>headRow.innerHTML+=`<th>${i}</th>`);
  thead.appendChild(headRow);
  table.appendChild(thead);
  const tbody = document.createElement("tbody");
  data.forEach(r=>{
    const tr = document.createElement("tr");
    r.forEach(c=>{
      const td = document.createElement("td");
      td.textContent = c;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
  table.appendChild(tbody);
}

function renderAllTables(){
  renderTasks();
  renderTable("projectsTable",projects);
  renderTable("peopleTable",people);
  renderTable("filesTable",files);
  renderTable("updatesTable",updates);
  renderTable("instructionsTable",instructions);
}

function populateFilters(){
  fillSelect("filterProject", new Set(tasks.map(t=>t[1])));
  fillSelect("filterStatus", new Set(tasks.map(t=>t[5])));
  fillSelect("filterOwner", new Set(tasks.map(t=>t[3])));
  fillSelect("filterReviewer", new Set(tasks.map(t=>t[4])));
  fillSelect("filterPriority", new Set(tasks.map(t=>t[6])));
}
function fillSelect(id, values){
  const sel = document.getElementById(id);
  sel.innerHTML = "<option value=''>All</option>";
  values.forEach(v=>{ const opt=document.createElement("option"); opt.value=v; opt.textContent=v; sel.appendChild(opt); });
}

function renderTasks(){
  const tbody = document.createElement("tbody");
  tasks.forEach(t=>{
    const tr=document.createElement("tr");
    if(t[5]=="Not Relevant") tr.classList.add("not-relevant");
    tr.innerHTML = `
      <td style="width:40px; font-size:12px;">${t[0]}</td>
      <td style="width:60px; font-size:12px;">${t[1]}</td>
      <td contenteditable="true" onblur="editTask('${t[0]}',2,this.textContent)">${t[2]}</td>
      <td><select onchange="editTask('${t[0]}',3,this.value)">${people.map(p=>`<option ${p[0]===t[3]?'selected':''}>${p[0]}</option>`).join('')}</select></td>
      <td><select onchange="editTask('${t[0]}',4,this.value)">${people.map(p=>`<option ${p[0]===t[4]?'selected':''}>${p[0]}</option>`).join('')}</select></td>
      <td><select onchange="editTask('${t[0]}',5,this.value)">${["To Do","In Progress","Done","Not Relevant"].map(s=>`<option ${s===t[5]?'selected':''}>${s}</option>`).join('')}</select></td>
      <td><select onchange="editTask('${t[0]}',6,this.value)">${["High","Medium","Low"].map(s=>`<option ${s===t[6]?'selected':''}>${s}</option>`).join('')}</select></td>
      <td><input type="date" value="${t[7]||''}" onchange="editTask('${t[0]}',7,this.value)"></td>
      <td><a href="${t[8]||'https://google.com'}" target="_blank">${t[8]||'https://google.com'}</a></td>
      <td contenteditable="true" onblur="editTask('${t[0]}',9,this.textContent)">${t[9]}</td>
      <td>
        <button class="btn" onclick="openModal('${t[0]}')">Updates</button>
        <button class="btn" onclick="deleteTask('${t[0]}')">Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  const table=document.getElementById("tasksTable");
  table.querySelectorAll("tbody").forEach(n=>n.remove());
  table.appendChild(tbody);
}

function editTask(taskID,col,value){
  const task=tasks.find(t=>t[0]==taskID);
  task[col]=value;
  logUpdate(taskID, `Edited column ${col}: ${value}`);
  renderTasks();
}

function addTask(){
  const newID = "TASK-"+String(tasks.length+1).padStart(3,'0');
  const newTask=[newID,"New Project","New Task",people[0]?.[0]||"Owner",people[1]?.[0]||"Reviewer","To Do","Medium","","https://google.com",""];
  tasks.push(newTask);
  logUpdate(newID,"Task added");
  renderTasks();
}

function deleteTask(taskID){
  if(!confirm("Are you sure you want to delete this task?")) return;
  tasks=tasks.filter(t=>t[0]!=taskID);
  logUpdate(taskID,"Task deleted");
  renderTasks();
}

function logUpdate(taskID,msg,author="System"){
  const now=new Date().toISOString();
  updates.push([taskID,author,msg,now]);
}

function openModal(taskID){
  currentTaskID=taskID;
  document.getElementById("modalTaskID").textContent=taskID;
  const list=document.getElementById("updatesList");
  list.innerHTML="";
  updates.filter(u=>u[0]==taskID).forEach(u=>{
    const div=document.createElement("div");
    div.textContent=`[${u[3]}] ${u[1]}: ${u[2]}`;
    list.appendChild(div);
  });
  document.getElementById("updateModal").style.display="block";
}

function closeModal(){ document.getElementById("updateModal").style.display="none"; }

function populateAuthors(){
  const sel=document.getElementById("updateAuthor");
  sel.innerHTML="";
  people.forEach(p=>{
    const opt=document.createElement("option");
    opt.value=p[0]; opt.textContent=p[0]; sel.appendChild(opt);
  });
}

function addUpdate(){
  const author=document.getElementById("manualAuthor").value || document.getElementById("updateAuthor").value;
  const msg=document.getElementById("updateMessage").value;
  if(!author || !msg) return alert("Enter author and message");
  logUpdate(currentTaskID,msg,author);
  document.getElementById("updateMessage").value="";
  openModal(currentTaskID);
}

document.querySelectorAll("#filterProject, #filterStatus, #filterOwner, #filterReviewer, #filterPriority").forEach(f=>{
  f.addEventListener("change",renderTasks);
});

function saveChanges(){ alert("All changes logged locally (or to be synced with Google Sheets)"); }

loadData();
</script>

</body>
</html>
