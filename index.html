<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKO Tasks Tracker</title>
<style>
body { font-family: Arial; padding: 20px; background: #f5f5f5; }
h1 { margin-bottom: 20px; }
.tabs { display: flex; margin-bottom: 15px; flex-wrap: wrap; }
.tab { padding: 10px 15px; margin-right: 5px; background: #ddd; border-radius: 5px; cursor: pointer; }
.tab.active { background: #aaa; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }
table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
th { background: #eee; }
select { padding: 3px; }
.task-link { color: blue; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<h1>AKO Tasks Tracker</h1>

<div class="tabs">
  <div class="tab active" data-tab="tasks">Tasks</div>
  <div class="tab" data-tab="projects">Projects</div>
  <div class="tab" data-tab="files">Files</div>
  <div class="tab" data-tab="updates">Updates</div>
  <div class="tab" data-tab="instructions">Instructions</div>
</div>

<div id="filters" style="margin-bottom:15px;">
  <label>Project:
    <select id="filterProject"><option value="">All</option></select>
  </label>
  <label>Status:
    <select id="filterStatus"><option value="">All</option></select>
  </label>
</div>

<div id="tasks" class="tab-content active"></div>
<div id="projects" class="tab-content"></div>
<div id="files" class="tab-content"></div>
<div id="updates" class="tab-content"></div>
<div id="instructions" class="tab-content"></div>

<div id="taskModal" style="display:none; position:fixed; top:10%; left:10%; width:80%; height:80%; background:white; border:2px solid #aaa; border-radius:10px; padding:20px; overflow:auto; z-index:1000;">
  <button id="closeModal" style="float:right;">Close</button>
  <div id="modalContent"></div>
</div>

<script>
// Tabs
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".tab-content");
tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    contents.forEach(c => c.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

// Modal
const modal = document.getElementById("taskModal");
const modalContent = document.getElementById("modalContent");
document.getElementById("closeModal").onclick = () => modal.style.display = "none";

// Base URL
const baseURL = "https://raw.githubusercontent.com/yesmooncat/AKO/main/data/";

// Data
let tasks = [], projects = [], files = [], updates = [], instructions = [];
let currentProjectFilter = "", currentStatusFilter = "";

// Load JSONs
fetch(baseURL + "tasks.json").then(r=>r.json()).then(d=>{ tasks=d; populateFilters(); renderTasks(); });
fetch(baseURL + "projects.json").then(r=>r.json()).then(d=>{ projects=d; renderProjects(); });
fetch(baseURL + "files.json").then(r=>r.json()).then(d=>{ files=d; renderFiles(); });
fetch(baseURL + "updates.json").then(r=>r.json()).then(d=>{ updates=d; renderUpdates(); });
fetch(baseURL + "instructions.json").then(r=>r.json()).then(d=>{ instructions=d; renderInstructions(); });

// Populate filters
function populateFilters() {
  const projSelect = document.getElementById("filterProject");
  const statusSelect = document.getElementById("filterStatus");
  let projectsSet = new Set(tasks.map(t=>t.Project));
  let statusSet = new Set(tasks.map(t=>t.Status));
  projectsSet.forEach(p => { let o = document.createElement("option"); o.value=p;o.text=p;projSelect.appendChild(o); });
  statusSet.forEach(s => { let o = document.createElement("option"); o.value=s;o.text=s;statusSelect.appendChild(o); });
  projSelect.onchange = () => { currentProjectFilter = projSelect.value; renderTasks(); };
  statusSelect.onchange = () => { currentStatusFilter = statusSelect.value; renderTasks(); };
}

// Render Tasks Table
function renderTasks() {
  const container = document.getElementById("tasks");
  container.innerHTML = "";
  const table = document.createElement("table");
  const header = document.createElement("tr");
  ["Task_ID","Project","Task_Name","Owner","Reviewer","Status","Priority","Deadline","Dropbox","Comment"].forEach(h=>{
    const th = document.createElement("th"); th.textContent=h; header.appendChild(th);
  });
  table.appendChild(header);

  tasks.filter(t=>{
    return (currentProjectFilter === "" || t.Project === currentProjectFilter) &&
           (currentStatusFilter === "" || t.Status === currentStatusFilter);
  }).forEach(t=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.Task_ID || "-"}</td>
      <td>${t.Project || "-"}</td>
      <td class="task-link">${t.Task_Name || "-"}</td>
      <td>
        <select class="owner-select">
          <option ${t.Owner==="Vika"?"selected":""}>Vika</option>
          <option ${t.Owner==="Natasha"?"selected":""}>Natasha</option>
          <option ${t.Owner==="Artyom"?"selected":""}>Artyom</option>
        </select>
      </td>
      <td>
        <select class="reviewer-select">
          <option ${t.Reviewer==="Vika"?"selected":""}>Vika</option>
          <option ${t.Reviewer==="Natasha"?"selected":""}>Natasha</option>
          <option ${t.Reviewer==="Artyom"?"selected":""}>Artyom</option>
        </select>
      </td>
      <td>
        <select class="status-select">
          <option ${t.Status==="To Do"?"selected":""}>To Do</option>
          <option ${t.Status==="In Progress"?"selected":""}>In Progress</option>
          <option ${t.Status==="Done"?"selected":""}>Done</option>
        </select>
      </td>
      <td>${t.Priority || "-"}</td>
      <td>${t.Deadline || "-"}</td>
      <td>${t.Dropbox_Link ? `<a href="${t.Dropbox_Link}" target="_blank">Open</a>`:"-"}</td>
      <td>${t.Comment || "-"}</td>
    `;
    // Task modal click
    tr.querySelector(".task-link").onclick = ()=>{ modal.style.display="block"; modalContent.innerHTML=`<h2>${t.Task_Name}</h2><p><b>Comment:</b> ${t.Comment || "-"}</p>`; };
    table.appendChild(tr);
  });
  container.appendChild(table);
}

// Render Projects
function renderProjects() {
  const container = document.getElementById("projects");
  container.innerHTML = "";
  const table = document.createElement("table");
  const header = document.createElement("tr");
  ["Project","Description","Status","Owner","Start Date","Dropbox Folder"].forEach(h=>{const th=document.createElement("th");th.textContent=h;header.appendChild(th);});
  table.appendChild(header);
  projects.forEach(p=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${p.Project || "-"}</td>
                    <td>${p.Description || "-"}</td>
                    <td>${p.Status || "-"}</td>
                    <td>${p.Owner || "-"}</td>
                    <td>${p["Start Date"] || "-"}</td>
                    <td>${p.Dropbox_Folder || "-"}</td>`;
    table.appendChild(tr);
  });
  container.appendChild(table);
}

// Render Files
function renderFiles() {
  const container = document.getElementById("files");
  container.innerHTML = "";
  const table = document.createElement("table");
  const header = document.createElement("tr");
  ["Project","File_Name","File_Type","Dropbox_Link","Related_Task_ID"].forEach(h=>{const th=document.createElement("th");th.textContent=h;header.appendChild(th);});
  table.appendChild(header);
  files.forEach(f=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${f.Project || "-"}</td>
                    <td>${f.File_Name || "-"}</td>
                    <td>${f.File_Type || "-"}</td>
                    <td>${f.Dropbox_Link ? `<a href="${f.Dropbox_Link}" target="_blank">Open</a>`:"-"}</td>
                    <td>${f.Related_Task_ID || "-"}</td>`;
    table.appendChild(tr);
  });
  container.appendChild(table);
}

// Render Updates
function renderUpdates() {
  const container = document.getElementById("updates");
  container.innerHTML = "";
  const table = document.createElement("table");
  const header = document.createElement("tr");
  ["Task_ID","Author","Message","Timestamp"].forEach(h=>{const th=document.createElement("th");th.textContent=h;header.appendChild(th);});
  table.appendChild(header);
  updates.forEach(u=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${u.Task_ID || "-"}</td>
                    <td>${u.Author || "-"}</td>
                    <td>${u.Message || "-"}</td>
                    <td>${u.Timestamp || "-"}</td>`;
    table.appendChild(tr);
  });
  container.appendChild(table);
}

// Render Instructions
function renderInstructions() {
  const container = document.getElementById("instructions");
  container.innerHTML = "";
  const pre = document.createElement("pre");
  pre.textContent = instructions.map(i=>i.HOW || "-").join("\n\n");
  container.appendChild(pre);
}
</script>
</body>
</html>
