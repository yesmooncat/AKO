<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Tracker</title>
<style>
  body {
    background-color: #121212;
    color: #ffffff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
  }
  h2 {
    text-align: center;
    padding: 10px;
  }
  .controls {
    padding: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .controls label {
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 800px;
  }
  th, td {
    border: 1px solid #333;
    padding: 6px 8px;
    text-align: left;
  }
  th {
    background-color: #1e1e1e;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  tr.not-relevant {
    color: #777;
  }
  a {
    color: #3399ff;
    text-decoration: underline;
  }
  select, input, textarea {
    background-color: #222;
    color: #fff;
    border: 1px solid #555;
    padding: 4px;
    font-size: 14px;
  }
  .btn {
    background-color: #3399ff;
    color: #fff;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 14px;
    margin: 2px 0;
  }
  .btn:hover {
    background-color: #1e88e5;
  }
  .modal {
    display: none; 
    position: fixed;
    z-index: 10; 
    left: 0;
    top: 0;
    width: 100%; 
    height: 100%; 
    overflow: auto;
    background-color: rgba(0,0,0,0.9); 
  }
  .modal-content {
    background-color: #1e1e1e;
    margin: 10% auto; 
    padding: 20px;
    border: 1px solid #888;
    width: 90%; 
    color: #fff;
  }
  .small-column {
    font-size: 12px;
    width: 50px;
  }
</style>
</head>
<body>

<h2>Project Tracker</h2>

<div class="controls">
  <label>Project:
    <select id="filterProject"></select>
  </label>
  <label>Status:
    <select id="filterStatus"></select>
  </label>
  <label>Owner:
    <select id="filterOwner"></select>
  </label>
  <label>Reviewer:
    <select id="filterReviewer"></select>
  </label>
  <label>Priority:
    <select id="filterPriority"></select>
  </label>
  <button class="btn" onclick="addTask()">Add Task</button>
  <button class="btn" onclick="saveAll()">Save</button>
</div>

<div style="overflow-x:auto;">
<table id="tasksTable">
  <thead>
    <tr>
      <th class="small-column">Task ID</th>
      <th class="small-column">Project</th>
      <th>Task Name</th>
      <th>Owner</th>
      <th>Reviewer</th>
      <th>Status</th>
      <th>Priority</th>
      <th>Deadline</th>
      <th>Dropbox Link</th>
      <th>Comment</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>
</div>

<div id="updateModal" class="modal">
  <div class="modal-content">
    <h3>Updates for Task: <span id="modalTaskID"></span></h3>
    <div id="updatesList" style="max-height:300px; overflow-y:auto; margin-bottom:10px;"></div>
    <label>Author:
      <select id="updateAuthor"></select>
      or <input type="text" id="manualAuthor" placeholder="Your name">
    </label><br><br>
    <textarea id="updateMessage" placeholder="Enter comment..." rows="3" style="width:100%; background:#222; color:#fff;"></textarea><br><br>
    <button class="btn" onclick="addUpdate()">Add Comment</button>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const SHEET_ID = "1GyvpnccBQF0AXroVtncqMMcyTQL70quOBq9MktIUf2s";
const TABS = ["Projects","Tasks","People","Files","Updates","Instructions"];

let tasks = [], projects = [], people = [], updates = [];
let currentTaskID = null;

async function fetchSheet(sheetName){
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
  const res = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.match(/.*google\.visualization\.Query\.setResponse\((.*)\);/s)[1]);
  return json.table.rows.map(r=>r.c.map(c=>c ? c.v : ""));
}

async function loadData(){
  tasks = await fetchSheet("Tasks");
  projects = await fetchSheet("Projects");
  people = await fetchSheet("People");
  updates = await fetchSheet("Updates");
  populateFilters();
  populateAuthors();
  renderTasks();
}

function populateFilters(){
  fillSelect("filterProject", new Set(tasks.map(t=>t[1])));
  fillSelect("filterStatus", new Set(tasks.map(t=>t[5])));
  fillSelect("filterOwner", new Set(tasks.map(t=>t[3])));
  fillSelect("filterReviewer", new Set(tasks.map(t=>t[4])));
  fillSelect("filterPriority", new Set(tasks.map(t=>t[6])));
}

function fillSelect(id, values){
  const sel = document.getElementById(id);
  sel.innerHTML = "<option value=''>All</option>";
  values.forEach(v=>{
    const opt = document.createElement("option");
    opt.value=v;
    opt.textContent=v;
    sel.appendChild(opt);
  });
  sel.onchange = renderTasks;
}

function renderTasks(){
  const tbody = document.querySelector("#tasksTable tbody");
  tbody.innerHTML = "";
  tasks.forEach(t=>{
    const tr = document.createElement("tr");
    if(t[5]=="Not Relevant") tr.classList.add("not-relevant");
    tr.innerHTML = `
      <td class="small-column">${t[0]}</td>
      <td class="small-column">${t[1]}</td>
      <td contenteditable="true" onblur="editTask('${t[0]}',2,this.textContent)">${t[2]}</td>
      <td>
        <select onchange="editTask('${t[0]}',3,this.value)">
          ${people.map(p=>`<option ${p[0]===t[3]?'selected':''}>${p[0]}</option>`).join("")}
        </select>
      </td>
      <td>
        <select onchange="editTask('${t[0]}',4,this.value)">
          ${people.map(p=>`<option ${p[0]===t[4]?'selected':''}>${p[0]}</option>`).join("")}
        </select>
      </td>
      <td>
        <select onchange="editTask('${t[0]}',5,this.value)">
          <option ${t[5]==="To Do"?"selected":""}>To Do</option>
          <option ${t[5]==="In Progress"?"selected":""}>In Progress</option>
          <option ${t[5]==="Done"?"selected":""}>Done</option>
          <option ${t[5]==="Not Relevant"?"selected":""}>Not Relevant</option>
          <option ${t[5]==="Overdue"?"selected":""}>Overdue</option>
        </select>
      </td>
      <td contenteditable="true" onblur="editTask('${t[0]}',6,this.textContent)">${t[6]}</td>
      <td><input type="date" value="${t[7]}" onchange="editTask('${t[0]}',7,this.value)"></td>
      <td><a href="${t[8] || 'https://google.com'}" target="_blank">${t[8] || 'https://google.com'}</a></td>
      <td contenteditable="true" onclick="openModal('${t[0]}')">${t[9]}</td>
      <td><button class="btn" onclick="deleteTask('${t[0]}')">Delete</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function editTask(taskID,colIndex,value){
  const task = tasks.find(t=>t[0]==taskID);
  task[colIndex] = value;
  logUpdate(taskID, `Edited column ${colIndex}: ${value}`);
  renderTasks();
}

function addTask(){
  const newID = `TASK-${String(tasks.length+1).padStart(3,'0')}`;
  const newTask = [newID,"","New Task","Vika","Natasha","To Do","High","2026-03-20","https://google.com",""];
  tasks.push(newTask);
  logUpdate(newID,"Task added");
  renderTasks();
}

function deleteTask(taskID){
  if(!confirm("Are you sure you want to delete this task?")) return;
  tasks = tasks.filter(t=>t[0]!=taskID);
  logUpdate(taskID,"Task deleted");
  renderTasks();
}

function populateAuthors(){
  const sel = document.getElementById("updateAuthor");
  sel.innerHTML = "";
  people.forEach(p=>{
    const opt = document.createElement("option");
    opt.value = p[0];
    opt.textContent = p[0];
    sel.appendChild(opt);
  });
}

function openModal(taskID){
  currentTaskID = taskID;
  document.getElementById("modalTaskID").textContent = taskID;
  const list = document.getElementById("updatesList");
  list.innerHTML = "";
  updates.filter(u=>u[0]==taskID).forEach(u=>{
    const div = document.createElement("div");
    div.textContent = `[${u[3]}] ${u[1]}: ${u[2]}`;
    list.appendChild(div);
  });
  document.getElementById("updateModal").style.display = "block";
}
function closeModal(){ document.getElementById("updateModal").style.display = "none"; }

function addUpdate(){
  const author = document.getElementById("manualAuthor").value || document.getElementById("updateAuthor").value;
  const msg = document.getElementById("updateMessage").value;
  if(!author || !msg) return alert("Enter author and message");
  const now = new Date().toISOString();
  updates.push([currentTaskID, author, msg, now]);
  logUpdate(currentTaskID, msg, author);
  document.getElementById("updateMessage").value = "";
  openModal(currentTaskID);
}

function logUpdate(taskID,message,author="System"){
  const now = new Date().toISOString();
  updates.push([taskID, author, message, now]);
}

function saveAll(){
  alert("Сохранение в Google Sheets реализуется отдельно через API или скрипт Apps Script");
}

loadData();
</script>

</body>
</html>
