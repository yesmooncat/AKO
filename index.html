<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKO Tasks Tracker</title>
<style>
body { font-family: Arial; background: #f5f5f5; padding: 20px; }
h1 { margin-bottom: 20px; }
.task-card {
  background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>
<body>
<h1>AKO Tasks Tracker</h1>
<div id="task-container"></div>

<script>
const taskContainer = document.getElementById('task-container');
let tasks = [];

fetch("https://raw.githubusercontent.com/yesmooncat/AKO/main/data/tasks.json")
  .then(res => res.json())
  .then(data => {
    tasks = data;
    renderTasks();
  })
  .catch(err => {
    taskContainer.innerHTML = "Error loading tasks: " + err;
  });

function renderTasks() {
  taskContainer.innerHTML = "";
  tasks.forEach(task => {
    const card = document.createElement("div");
    card.className = "task-card";
    card.innerHTML = `
      <h3>${task.Task_Name}</h3>
      <strong>Project:</strong> ${task.Project}<br>
      <strong>Status:</strong> ${task.Status}<br>
      <strong>Owner:</strong> ${task.Owner}<br>
      <strong>Reviewer:</strong> ${task.Reviewer}<br>
      <strong>Deadline:</strong> ${task.Deadline}<br>
      <a href="${task.Dropbox_Link}" target="_blank">Open in Dropbox</a><br>
      <em>${task.Comment}</em>
    `;
    taskContainer.appendChild(card);
  });
}
</script>
</body>
</html>
