<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKO Tasks Tracker - Mobile Dark</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Dark mobile-friendly theme */
body { font-family: Arial; background: #121212; color: #eee; margin:0; padding:10px; }
h1 { font-size: 1.5em; margin-bottom: 15px; }
.tabs { display: flex; overflow-x: auto; margin-bottom: 10px; }
.tab { padding: 8px 12px; margin-right: 5px; background: #1f1f1f; border-radius: 5px; cursor: pointer; white-space: nowrap; }
.tab.active { background: #333; color: #fff; }
.tab-content { display: none; }
.tab-content.active { display: block; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th, td { border: 1px solid #333; padding: 8px; text-align: left; font-size: 0.9em; color: #eee; }
th { background: #1f1f1f; position: sticky; top: 0; z-index: 2; }
select, input, textarea { background: #222; color: #eee; border: 1px solid #555; border-radius: 4px; padding: 4px; width: 100%; box-sizing: border-box; font-size: 0.9em; }
textarea { resize: vertical; }
.task-link { color: #4fc3f7; cursor: pointer; text-decoration: underline; }
.modal { display:none; position:fixed; top:5%; left:5%; width:90%; height:90%; background:#1e1e1e; border:2px solid #555; border-radius:10px; padding:15px; overflow:auto; z-index:1000; color:#eee; }
.modal button { float:right; padding:5px 10px; background:#444; color:#eee; border:none; border-radius:4px; cursor:pointer; }
#filters { display:flex; gap:10px; margin-bottom:10px; flex-wrap:wrap; }
#filters label { font-size:0.9em; }
</style>
</head>
<body>
<h1>AKO Tasks Tracker</h1>

<div class="tabs">
  <div class="tab active" data-tab="tasks">Tasks</div>
  <div class="tab" data-tab="projects">Projects</div>
  <div class="tab" data-tab="files">Files</div>
  <div class="tab" data-tab="updates">Updates</div>
  <div class="tab" data-tab="instructions">Instructions</div>
</div>

<div id="filters">
  <label>Project:
    <select id="filterProject"><option value="">All</option></select>
  </label>
  <label>Status:
    <select id="filterStatus"><option value="">All</option></select>
  </label>
</div>

<div id="tasks" class="tab-content active"></div>
<div id="projects" class="tab-content"></div>
<div id="files" class="tab-content"></div>
<div id="updates" class="tab-content"></div>
<div id="instructions" class="tab-content"></div>

<div id="taskModal" class="modal">
  <button id="closeModal">Close</button>
  <div id="modalContent"></div>
</div>

<script>
// Tabs
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".tab-content");
tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    contents.forEach(c => c.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

// Modal
const modal = document.getElementById("taskModal");
const modalContent = document.getElementById("modalContent");
document.getElementById("closeModal").onclick = () => modal.style.display = "none";

// Base URL
const baseURL = "https://raw.githubusercontent.com/yesmooncat/AKO/main/data/";

// Data
let tasks = [], projects = [], files = [], updates = [], instructions = [];
let currentProjectFilter = "", currentStatusFilter = "";

// Load JSONs
fetch(baseURL + "tasks.json").then(r=>r.json()).then(d=>{ tasks=d; populateFilters(); renderTasks(); });
fetch(baseURL + "projects.json").then(r=>r.json()).then(d=>{ projects=d; renderProjects(); });
fetch(baseURL + "files.json").then(r=>r.json()).then(d=>{ files=d; renderFiles(); });
fetch(baseURL + "updates.json").then(r=>r.json()).then(d=>{ updates=d; renderUpdates(); });
fetch(baseURL + "instructions.json").then(r=>r.json()).then(d=>{ instructions=d; renderInstructions(); });

// Populate filters
function populateFilters() {
  const projSelect = document.getElementById("filterProject");
  const statusSelect = document.getElementById("filterStatus");
  let projectsSet = new Set(tasks.map(t=>t.Project));
  let statusSet = new Set(tasks.map(t=>t.Status));
  projectsSet.forEach(p => { let o = document.createElement("option"); o.value=p;o.text=p;projSelect.appendChild(o); });
  statusSet.forEach(s => { let o = document.createElement("option"); o.value=s;o.text=s;statusSelect.appendChild(o); });
  projSelect.onchange = () => { currentProjectFilter = projSelect.value; renderTasks(); };
  statusSelect.onchange = () => { currentStatusFilter = statusSelect.value; renderTasks(); };
}

// Render Tasks Table (editable)
function renderTasks() {
  const container = document.getElementById("tasks");
  container.innerHTML = "";
  const table = document.createElement("table");
  const header = document.createElement("tr");
  ["Task_ID","Project","Task_Name","Owner","Reviewer","Status","Priority","Deadline","Dropbox","Comment"].forEach(h=>{
    const th = document.createElement("th"); th.textContent=h; header.appendChild(th);
  });
  table.appendChild(header);

  tasks.filter(t=>{
    return (currentProjectFilter === "" || t.Project === currentProjectFilter) &&
           (currentStatusFilter === "" || t.Status === currentStatusFilter);
  }).forEach(t=>{
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${t.Task_ID || "-"}</td>
      <td>${t.Project || "-"}</td>
      <td contenteditable="true">${t.Task_Name || "-"}</td>
      <td>
        <select class="owner-select">
          <option ${t.Owner==="Vika"?"selected":""}>Vika</option>
          <option ${t.Owner==="Natasha"?"selected":""}>Natasha</option>
          <option ${t.Owner==="Artyom"?"selected":""}>Artyom</option>
        </select>
      </td>
      <td>
        <select class="reviewer-select">
          <option ${t.Reviewer==="Vika"?"selected":""}>Vika</option>
          <option ${t.Reviewer==="Natasha"?"selected":""}>Natasha</option>
          <option ${t.Reviewer==="Artyom"?"selected":""}>Artyom</option>
        </select>
      </td>
      <td>
        <select class="status-select">
          <option ${t.Status==="To Do"?"selected":""}>To Do</option>
          <option ${t.Status==="In Progress"?"selected":""}>In Progress</option>
          <option ${t.Status==="Done"?"selected":""}>Done</option>
        </select>
      </td>
      <td>
        <select class="priority-select">
          <option ${t.Priority==="High"?"selected":""}>High</option>
          <option ${t.Priority==="Medium"?"selected":""}>Medium</option>
          <option ${t.Priority==="Low"?"selected":""}>Low</option>
        </select>
      </td>
      <td><input type="date" value="${t.Deadline || ''}"></td>
      <td contenteditable="true">${t.Dropbox_Link || "-"}</td>
      <td contenteditable="true">${t.Comment || "-"}</td>
    `;
    table.appendChild(tr);
  });
  container.appendChild(table);
}

// Render other tabs same as before
function renderProjects() {
  const container = document.getElementById("projects"); container.innerHTML="";
  const table = document.createElement("table");
  const header = document.createElement("tr");
  ["Project","Description","Status","Owner","Start Date","Dropbox Folder"].forEach(h=>{let th=document.createElement("th");th.textContent=h;header.appendChild(th);});
  table.appendChild(header);
  projects.forEach(p=>{
    const tr=document.createElement("tr");
    tr.innerHTML=`<td>${p.Project||"-"}</td><td>${p.Description||"-"}</td><td>${p.Status||"-"}</td><td>${p.Owner||"-"}</td><td>${p["Start Date"]||"-"}</td><td>${p.Dropbox_Folder||"-"}</td>`;
    table.appendChild(tr);
  });
  container.appendChild(table);
}
function renderFiles(){const c=document.getElementById("files");c.innerHTML="";const t=document.createElement("table");const h=document.createElement("tr");["Project","File_Name","File_Type","Dropbox_Link","Related_Task_ID"].forEach(x=>{let th=document.createElement("th");th.textContent=x;h.appendChild(th);});t.appendChild(h);files.forEach(f=>{const r=document.createElement("tr");r.innerHTML=`<td>${f.Project||"-"}</td><td>${f.File_Name||"-"}</td><td>${f.File_Type||"-"}</td><td>${f.Dropbox_Link?`<a href="${f.Dropbox_Link}" target="_blank">Open</a>`:"-"}</td><td>${f.Related_Task_ID||"-"}</td>`;t.appendChild(r);});c.appendChild(t);}
function renderUpdates(){const c=document.getElementById("updates");c.innerHTML="";const t=document.createElement("table");const h=document.createElement("tr");["Task_ID","Author","Message","Timestamp"].forEach(x=>{let th=document.createElement("th");th.textContent=x;h.appendChild(th);});t.appendChild(h);updates.forEach(u=>{const r=document.createElement("tr");r.innerHTML=`<td>${u.Task_ID||"-"}</td><td>${u.Author||"-"}</td><td>${u.Message||"-"}</td><td>${u.Timestamp||"-"}</td>`;t.appendChild(r);});c.appendChild(t);}
function renderInstructions(){const c=document.getElementById("instructions");c.innerHTML="";const pre=document.createElement("pre");pre.textContent=instructions.map(i=>i.HOW||"-").join("\n\n");c.appendChild(pre);}
</script>
</body>
</html>
