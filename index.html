<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AKO Tasks Tracker</title>
<style>
body { font-family: Arial; background: #f5f5f5; padding: 20px; }
h1 { margin-bottom: 20px; }
.tabs { display: flex; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 10px 15px; margin-right: 5px; background: #ddd; border-radius: 5px; cursor: pointer; }
.tab.active { background: #aaa; color: white; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.task-card { background:white; border-radius:10px; padding:15px; margin-bottom:12px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
</style>
</head>
<body>
<h1>AKO Tasks Tracker</h1>

<div class="tabs">
  <div class="tab active" data-tab="tasks">Tasks</div>
  <div class="tab" data-tab="projects">Projects</div>
  <div class="tab" data-tab="files">Files</div>
  <div class="tab" data-tab="updates">Updates</div>
  <div class="tab" data-tab="instructions">Instructions</div>
</div>

<div id="tasks" class="tab-content active"></div>
<div id="projects" class="tab-content"></div>
<div id="files" class="tab-content"></div>
<div id="updates" class="tab-content"></div>
<div id="instructions" class="tab-content"></div>

<script>
// Tabs
const tabs = document.querySelectorAll(".tab");
const contents = document.querySelectorAll(".tab-content");
tabs.forEach(tab => {
  tab.addEventListener("click", () => {
    tabs.forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    contents.forEach(c => c.classList.remove("active"));
    document.getElementById(tab.dataset.tab).classList.add("active");
  });
});

// Load JSONs
const baseURL = "https://raw.githubusercontent.com/yesmooncat/AKO/main/data/";

let tasks = [], projects = [], files = [], updates = [], instructions = [];

fetch(baseURL + "tasks.json").then(r=>r.json()).then(d=>{ tasks=d; renderTasks(); }).catch(e=>console.error(e));
fetch(baseURL + "projects.json").then(r=>r.json()).then(d=>{ projects=d; renderProjects(); }).catch(e=>console.error(e));
fetch(baseURL + "files.json").then(r=>r.json()).then(d=>{ files=d; renderFiles(); }).catch(e=>console.error(e));
fetch(baseURL + "updates.json").then(r=>r.json()).then(d=>{ updates=d; renderUpdates(); }).catch(e=>console.error(e));
fetch(baseURL + "instructions.json").then(r=>r.json()).then(d=>{ instructions=d; renderInstructions(); }).catch(e=>console.error(e));

// Render functions
function renderTasks() {
  const container = document.getElementById("tasks");
  container.innerHTML = "";
  tasks.forEach(t => {
    const div = document.createElement("div");
    div.className = "task-card";
    div.innerHTML = `<b>${t.Task_Name || "-"}</b><br>
                     Project: ${t.Project || "-"}<br>
                     Status: ${t.Status || "-"}<br>
                     Owner: ${t.Owner || "-"}<br>
                     Reviewer: ${t.Reviewer || "-"}<br>
                     Deadline: ${t.Deadline || "-"}<br>
                     <a href="${t.Dropbox_Link || "#"}" target="_blank">Open in Dropbox</a><br>
                     <em>${t.Comment || "-"}</em>`;
    container.appendChild(div);
  });
}

function renderProjects() {
  const container = document.getElementById("projects");
  container.innerHTML = "";
  projects.forEach(p => {
    const div = document.createElement("div");
    div.className = "task-card";
    div.innerHTML = `<b>${p.Project || "-"}</b><br>
                     Description: ${p.Description || "-"}<br>
                     Status: ${p.Status || "-"}<br>
                     Owner: ${p.Owner || "-"}<br>
                     Start Date: ${p["Start Date"] || "-"}<br>
                     Dropbox Folder: ${p.Dropbox_Folder || "-"}`;
    container.appendChild(div);
  });
}

function renderFiles() {
  const container = document.getElementById("files");
  container.innerHTML = "";
  files.forEach(f => {
    const div = document.createElement("div");
    div.className = "task-card";
    div.innerHTML = `<b>${f.File_Name || "-"}</b><br>
                     Project: ${f.Project || "-"}<br>
                     Type: ${f.File_Type || "-"}<br>
                     Dropbox: ${f.Dropbox_Link || "-"}<br>
                     Related Task: ${f.Related_Task_ID || "-"}`;
    container.appendChild(div);
  });
}

function renderUpdates() {
  const container = document.getElementById("updates");
  container.innerHTML = "";
  updates.forEach(u => {
    const div = document.createElement("div");
    div.className = "task-card";
    div.innerHTML = `<b>${u.Author || "-"}</b>: ${u.Message || "-"}<br>
                     <small>${u.Timestamp || "-"}</small>`;
    container.appendChild(div);
  });
}

function renderInstructions() {
  const container = document.getElementById("instructions");
  container.innerHTML = "";
  instructions.forEach(i => {
    const div = document.createElement("div");
    div.className = "task-card";
    div.textContent = i.HOW || "-";
    container.appendChild(div);
  });
}
</script>
</body>
</html>
