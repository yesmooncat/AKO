<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АКО Tasks Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #fefefe; }
    h1 { text-align: center; color: #333; }
    #filters { margin-bottom: 20px; display: flex; gap: 10px; }
    select { padding: 5px; }
    .task-card { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px; background: #fff; }
    .task-card h3 { margin: 0 0 5px 0; }
    a { color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<h1>АКО Tasks Tracker</h1>

<div id="filters">
  <select id="filter-project">
    <option value="">All Projects</option>
  </select>
  <select id="filter-status">
    <option value="">All Status</option>
    <option value="To Do">To Do</option>
    <option value="In Progress">In Progress</option>
    <option value="Done">Done</option>
  </select>
  <select id="filter-reviewer">
    <option value="">All Reviewers</option>
  </select>
</div>

<div id="task-container"></div>

<script>
const taskContainer = document.getElementById('task-container');
const filterProject = document.getElementById('filter-project');
const filterStatus = document.getElementById('filter-status');
const filterReviewer = document.getElementById('filter-reviewer');

let tasks = [];
let projects = [];
let people = [];

// Подключаем JSON с репозитория AKO
const baseURL = 'https://raw.githubusercontent.com/yesmooncat/AKO/main/data/';

fetch(baseURL + 'tasks.json')
  .then(res => res.json())
  .then(data => { tasks = data; renderTasks(); });

fetch(baseURL + 'projects.json')
  .then(res => res.json())
  .then(data => { projects = data; loadProjects(); });

fetch(baseURL + 'people.json')
  .then(res => res.json())
  .then(data => { people = data; loadReviewers(); });

filterProject.addEventListener('change', renderTasks);
filterStatus.addEventListener('change', renderTasks);
filterReviewer.addEventListener('change', renderTasks);

function loadProjects() {
  projects.forEach(p => {
    const option = document.createElement('option');
    option.value = p.Project;
    option.textContent = p.Project;
    filterProject.appendChild(option);
  });
}

function loadReviewers() {
  const reviewers = [...new Set(people.map(p => p.Name))];
  reviewers.forEach(r => {
    const option = document.createElement('option');
    option.value = r;
    option.textContent = r;
    filterReviewer.appendChild(option);
  });
}

function renderTasks() {
  taskContainer.innerHTML = '';
  const projectFilter = filterProject.value;
  const statusFilter = filterStatus.value;
  const reviewerFilter = filterReviewer.value;

  tasks
    .filter(t => (!projectFilter || t.Project === projectFilter))
    .filter(t => (!statusFilter || t.Status === statusFilter))
    .filter(t => (!reviewerFilter || t.Reviewer === reviewerFilter))
    .forEach(task => {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.innerHTML = `
        <h3>${task.Task_Name}</h3>
        <strong>Project:</strong> ${task.Project}<br>
        <strong>Status:</strong> ${task.Status}<br>
        <strong>Owner:</strong> ${task.Owner}<br>
        <strong>Reviewer:</strong> ${task.Reviewer}<br>
        <strong>Priority:</strong> ${task.Priority}<br>
        <strong>Deadline:</strong> ${task.Deadline}<br>
        <strong>Comment:</strong> ${task.Comment}<br>
