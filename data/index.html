<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АКО Tasks Tracker</title>
<style>
body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
h1 { color: #333; }
.task-card { border: 1px solid #ccc; padding: 12px; margin-bottom: 10px; border-radius: 6px; background: #fff; }
label { margin-right: 10px; }
select { margin-right: 20px; padding: 4px; }
a { color: #007BFF; text-decoration: none; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>

<h1>АКО Tasks Tracker</h1>

<label>Project:
  <select id="filter-project">
    <option value="">All</option>
  </select>
</label>

<label>Status:
  <select id="filter-status">
    <option value="">All</option>
    <option value="to do">to do</option>
    <option value="in progress">in progress</option>
    <option value="done">done</option>
  </select>
</label>

<label>Reviewer:
  <select id="filter-reviewer">
    <option value="">All</option>
  </select>
</label>

<div id="task-container"></div>

<script>
const taskContainer = document.getElementById('task-container');
const filterProject = document.getElementById('filter-project');
const filterStatus = document.getElementById('filter-status');
const filterReviewer = document.getElementById('filter-reviewer');

let tasks = [];
let projects = [];
let people = [];

// Путь к JSON в папке data
const baseURL = 'https://raw.githubusercontent.com/yesmooncat/AKO/main/data/';

// Загружаем JSON
fetch(baseURL + 'tasks.json')
  .then(res => res.json())
  .then(data => { tasks = data; renderTasks(); loadProjects(); loadReviewers(); });

fetch(baseURL + 'projects.json')
  .then(res => res.json())
  .then(data => { projects = data; });

fetch(baseURL + 'people.json')
  .then(res => res.json())
  .then(data => { people = data; });

fetch(baseURL + 'updates.json')
  .then(res => res.json())
  .then(data => { /* можно использовать для апдейтов */ });

fetch(baseURL + 'instructions.json')
  .then(res => res.json())
  .then(data => { /* можно использовать для инструкций */ });

// События фильтров
filterProject.addEventListener('change', renderTasks);
filterStatus.addEventListener('change', renderTasks);
filterReviewer.addEventListener('change', renderTasks);

// Загрузка проектов в фильтр
function loadProjects() {
  projects.forEach(p => {
    const option = document.createElement('option');
    option.value = p.name;
    option.textContent = p.name;
    filterProject.appendChild(option);
  });
}

// Загрузка ревьюеров в фильтр
function loadReviewers() {
  const reviewersSet = new Set();
  tasks.forEach(t => { if (t.reviewer) reviewersSet.add(t.reviewer); });
  reviewersSet.forEach(r => {
    const option = document.createElement('option');
    option.value = r;
    option.textContent = r;
    filterReviewer.appendChild(option);
  });
}

// Отображение задач
function renderTasks() {
  taskContainer.innerHTML = '';
  const projectFilter = filterProject.value;
  const statusFilter = filterStatus.value;
  const reviewerFilter = filterReviewer.value;

  tasks
    .filter(t => (!projectFilter || t.project === projectFilter))
    .filter(t => (!statusFilter || t.status === statusFilter))
    .filter(t => (!reviewerFilter || t.reviewer === reviewerFilter))
    .forEach(task => {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.innerHTML = `
        <h3>${task.name}</h3>
        <strong>Project:</strong> ${task.project}<br>
        <strong>Status:</strong> ${task.status}<br>
        <strong>Owner:</strong> ${task.owner}<br>
        <strong>Reviewer:</strong> ${task.reviewer}<br>
        <strong>Priority:</strong> ${task.priority}<br>
        <strong>Deadline:</strong> ${task.deadline}<br>
        ${task.dropbox ? `<a href="${task.dropbox}" target="_blank">Open in Dropbox</a><br>` : ''}
        ${task.comment ? `<em>Comment:</em> ${task.comment}<br>` : ''}
        ${task.update ? `<em>Update:</em> ${task.update}<br>` : ''}
        ${task.instruction ? `<em>Instruction:</em> ${task.instruction}<br>` : ''}
      `;
      taskContainer.appendChild(card);
    });
}
</script>

</body>
</html>
